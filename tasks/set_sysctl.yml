---
# tasks file for ./roles/updater

# ------------------------------------------------------------------------------
- name: "UPDATER | sysctl | init tunning's step:: copy template sysctl.conf"
  become: true
  ansible.builtin.template:
    src: "sysctl.conf.j2"
    dest: "/etc/sysctl.d/99-sysctl.conf"
    mode: "0644"
  register: tunning_network_result
  tags:
    - updater
    - sysctl

- name: "UPDATER | sysctl | init tunning's step:: run 'sysctl -p --system'"
  become: true
  ansible.builtin.command: sysctl -p --system
  changed_when: tunning_network_result.changed | default(false) | bool
  when:
    - tunning_network_result is defined
    - tunning_network_result.changed is defined
    - tunning_network_result.changed | bool
    - ansible_facts['virtualization_type'] != "docker"
  tags:
    - updater
    - sysctl

- name: "UPDATER | sysctl | create sysctl-apply.service"
  become: true
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Reapply sysctl settings
      After=multi-user.target suspend.target sleep.target hibernate.target hybrid-sleep.target

      [Service]
      Type=oneshot
      ExecStartPre=/bin/sleep 16
      ExecStart=/usr/sbin/sysctl --system

      [Install]
      WantedBy=multi-user.target
      WantedBy=suspend.target
      WantedBy=hibernate.target
      WantedBy=hybrid-sleep.target
      WantedBy=sleep.target
    dest: "/etc/systemd/system/sysctl-apply.service"
    mode: "0644"
  register: sysctl_service_result
  tags:
    - updater
    - sysctl

- name: "UPDATER | sysctl | enable sysctl-apply.service"
  become: true
  ansible.builtin.systemd_service:
    name: sysctl-apply.service
    daemon_reload: true
    enabled: true
    masked: false
    state: started
  when:
    - sysctl_service_result is defined
    - sysctl_service_result.changed is defined
    - sysctl_service_result.changed | bool
  tags:
    - updater
    - sysctl
